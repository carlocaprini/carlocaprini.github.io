<!DOCTYPE html>
<html lang="en">
  <head>
    {% include head.html %}
  </head>
  <body>
    <div class="site">
      <header class="site-header">
        <div class="container nav">
          <div class="nav-left">
            <a href="{{ '/' | relative_url }}#top" class="brand">{{ site.data.person.name | default: site.title }}</a>
            <span class="tagline">{{ site.data.person.role }}</span>
          </div>
          <nav class="nav-right">
            <a href="{{ '/' | relative_url }}">Home</a>
            <!-- <a href="{{ '/' | relative_url }}#about">About</a> -->
            <a href="{{ '/experience/' | relative_url }}">Experience</a>
            <a href="{{ '/thinking/' | relative_url }}">Thinking</a>
            <a href="{{ '/influences/' | relative_url }}">Influences</a>
            <a href="{{ '/' | relative_url }}#contact">Contact</a>
          </nav>
        </div>
      </header>

      <main id="top">
        {{ content }}
      </main>

      <footer class="site-footer">
        <div class="container footer-inner">
          <span>&copy; {{ site.time | date: "%Y" }} {{ site.data.person.name | default: site.title }}</span>
          <span class="footer-meta">Built with Jekyll & Cursor &middot; Hosted on GitHub Pages</span>
        </div>
      </footer>
    </div>
  </body>
</html>
