<!DOCTYPE html>
<html lang="en">
  <head>
    {% include head.html %}
  </head>
  <body>
    <div class="site">
      <header class="site-header">
        <div class="container nav">
          <div class="nav-left">
            <a href="#top" class="brand">{{ site.person.name | default: site.title }}</a>
            <span class="tagline">{{ site.person.role | default: "Product leadership" }}</span>
          </div>
          <nav class="nav-right">
            <a href="#about">About</a>
            <a href="#what-i-do">What I do</a>
            <a href="#work">Selected work</a>
            <!-- <a href="#thinking">Thinking</a> -->
            <a href="#contact">Contact</a>
          </nav>
        </div>
      </header>

      <main id="top">
        {{ content }}
      </main>

      <footer class="site-footer">
        <div class="container footer-inner">
          <span>&copy; {{ site.time | date: "%Y" }} {{ site.person.name | default: site.title }}</span>
          <span class="footer-meta">Built with Jekyll &middot; Hosted on GitHub Pages</span>
        </div>
      </footer>
    </div>
  </body>
</html>
