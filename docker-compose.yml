services:
  site:
    # Docker Hub doesn't publish a `jekyll/jekyll:4.3` tag; 4.2.2 exists and works well for local dev.
    image: jekyll/jekyll:4.2.2
    working_dir: /srv/jekyll
    command: sh -lc "bundle install && bundle exec jekyll serve --host 0.0.0.0 --port 4000 --watch --force_polling --livereload"
    ports:
      - "4000:4000"
      - "35729:35729"
    volumes:
      - .:/srv/jekyll
      - bundle_cache:/usr/local/bundle
    environment:
      JEKYLL_ENV: development
      BUNDLE_PATH: /usr/local/bundle
      JEKYLL_UID: "${UID:-1000}"
      JEKYLL_GID: "${GID:-1000}"

volumes:
  bundle_cache:

