<aside class="hero-side">
  <div class="hero-card">
    <div class="hero-card-badge">
      <span></span>
      {{ h.hero.snapshot.badge }}
    </div>
    <div class="hero-metrics">
      {% for item in h.hero.snapshot.items %}
      <div class="metric">
        <div class="metric-value">{{ item.title }}</div>
        <div class="metric-label">{{ item.body }}</div>
      </div>
      {% endfor %}
    </div>
    <p class="hero-card-note">
      {{ h.hero.snapshot.note }}
    </p>
  </div>
</aside>
