title: "Carlo Caprini"
tagline: "Product leadership"
# Person fields (name, role, article_signature_role, linkedin) live in _data/person.yml
# so Liquid can read every key reliably (nested keys under person: in this file are not all exposed on site.person).
description: "Notes on product decisions, software platforms, AI adoption, engineering collaboration, and complex systems."
url: "https://carlocaprini.github.io"
production_url: "https://carlocaprini.github.io"
baseurl: ""
timezone: Europe/Rome

google_analytics: G-F6G0HN1JDJ

markdown: kramdown

permalink: pretty

collections:
  influences:
    output: false

plugins:
  - jekyll-feed
  - jekyll-sitemap

exclude:
  - GOAL.md
  - Gemfile
  - Gemfile.lock
  - docker-compose.yml
  - node_modules
  - README.md
  - _workspace
  - _site
