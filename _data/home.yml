how_i_work:
  eyebrow: How I work
  title: The areas where I focus my work
  intro_paragraphs:
    - My work sits at the intersection of product strategy, platform architecture, developer ecosystems and AI-enabled product capabilities.
    - I tend to focus on complex product systems where technology, product decisions and organizational structure are deeply connected.
  cards:
    - title: Platform product strategy
      body: Defining the strategy and evolution of complex platform products, with a focus on APIs, AI-enabled capabilities, developer ecosystems and long-term scalability.
      tags:
        - Platforms
        - APIs
        - AI
        - Product strategy
    - title: Developer ecosystems
      body: Improving how developers interact with platforms through better APIs, SDKs, tooling and documentation, enabling faster adoption and sustainable growth.
      tags:
        - Developer experience
        - SDKs
        - Tooling
    - title: Distributed product systems
      body: "Working on product problems that emerge in large distributed systems: event-driven architectures, observability and platform extensibility."
      tags:
        - Event-driven
        - Observability
        - Distributed systems

