where_i_can_help:
  eyebrow: Recurring questions
  title: The situations I keep coming back to.
  paragraphs:
    - My notes often start where product direction, technical constraints and team dynamics meet.
    - These are some of the questions that connect what I write with the work and systems I have experienced.
  cards:
    - title: When several directions look reasonable
      body: "How do teams decide what to build, what to postpone, and which trade-offs are worth accepting across customers, delivery and long-term system consequences?"
    - title: When an API becomes a product surface
      body: What changes when APIs, integrations and developer-facing capabilities start shaping the product experience for customers, partners, internal teams or AI agents?
    - title: When AI moves faster than understanding
      body: What still needs to be understood when prototypes, automation or agent workflows make something possible before reliability, ownership and product fit are clear?

