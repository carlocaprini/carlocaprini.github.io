hero:
  label: Product · Platforms · Decisions
  title_prefix: "Product decisions in "
  title_highlight: "complex software systems"
  subtitle_paragraphs:
    - "I write about the moments where product work becomes difficult: unclear priorities, urgent requests, technical trade-offs, platform evolution and teams interpreting the same context in different ways."
    - "I occasionally help software teams slow down complex decisions just enough to understand the real problem, the risks involved and the trade-offs they are accepting."
  actions:
    primary:
      label: Read notes
      url: /thinking/
    secondary:
      label: Start a conversation
      url: /#contact

about:
  eyebrow: About
  title: Product as a long-term system
  paragraphs:
    - I started my career as a software developer in a small startup before moving into product management.
    - Over the years I worked on complex digital platforms, helping teams design scalable systems and evolve product strategy as organizations grow.
    - My work focuses on how platforms evolve over time, how product decisions shape large distributed systems, and how AI changes the way people interact with software.
  pills_description: Some of the areas where I focus most of my work.
  pills:
    - Platform product strategy
    - API platforms
    - AI-enabled products
    - Developer experience
    - Event-driven systems
    - Observability platforms
    - Distributed systems

