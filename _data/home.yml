where_i_can_help:
  eyebrow: Where I can help
  title: The problems I tend to be useful around.
  paragraphs:
    - Most of my work sits where product direction, technical constraints and team dynamics meet.
    - I occasionally help teams make sense of decisions that are hard to evaluate from only one perspective.
  cards:
    - title: When several directions look reasonable
      body: "A team needs to decide what to build, what to postpone, and which trade-offs are worth accepting across customers, delivery and long-term system consequences."
      tags:
        - Trade-offs
        - Prioritization
        - Risk
        - Decision clarity
    - title: When an API becomes a product surface
      body: APIs, integrations or developer-facing capabilities start shaping the product experience for customers, partners, internal teams or AI agents.
      tags:
        - API platforms
        - Developer experience
        - Integrations
        - Platform coherence
    - title: When AI moves faster than understanding
      body: Prototypes, automation or agent workflows make something possible, but the team still needs to understand reliability, ownership, user value and product fit.
      tags:
        - AI adoption
        - Agent workflows
        - Ownership
        - Product fit
  boundary_note: "This is usually advisory work: understanding the context, clarifying the decision and shaping practical next steps. I do not replace internal teams or take over delivery."
  cta:
    text: If this sounds close to something your team is working through, let's talk.
    label: Start a conversation
    url: /#contact

