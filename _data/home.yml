hero:
  label: Product · Software · AI · Organisations
  title_prefix: "Notes on "
  title_highlight: "product decisions in complex software systems"
  subtitle_paragraphs:
    - "I write practical notes about the moments where product and engineering work become difficult: unclear priorities, technical trade-offs, platform evolution, AI adoption and teams interpreting the same context in different ways."
    - "The site connects those ideas with the experience behind them and selected readings that have shaped how I think."
  actions:
    primary:
      label: Start with selected notes
      url: /#selected-notes
    secondary:
      label: Explore the site
      url: /#explore
  snapshot:
    badge: Ideas on this site
    items:
      - title: Decisions
        body: Trade-offs, priorities and what enters implementation.
      - title: Platforms
        body: APIs, developer ecosystems and long-term evolution.
      - title: AI in practice
        body: Adoption, ownership and the gap between output and judgment.
    note: These themes connect notes, professional experience and external readings into one evolving body of work.

about:
  eyebrow: About
  title: Product as a long-term system
  paragraphs:
    - I started my career as a software developer in a small startup before moving into product management.
    - Over the years I worked on complex digital platforms, helping teams design scalable systems and evolve product strategy as organizations grow.
    - My work focuses on how platforms evolve over time, how product decisions shape large distributed systems, and how AI changes the way people interact with software.
  pills_description: Some of the areas where I focus most of my work.
  pills:
    - Platform product strategy
    - API platforms
    - AI-enabled products
    - Developer experience
    - Event-driven systems
    - Observability platforms
    - Distributed systems

