  title: Support for teams working through product, platform and technical decisions.
  paragraphs:
    - I occasionally work with digital product teams and technical leaders on situations that sit between product strategy, engineering constraints and how teams make decisions.
    - The work is usually about clarifying trade-offs, understanding risks, improving alignment and shaping practical next steps without losing sight of the system around the decision.
  cards:
    - title: Product and platform decision support
      body: Helping teams reason through product directions where customer needs, technical constraints and long-term system consequences are tightly connected.
