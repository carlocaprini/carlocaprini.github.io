        - Product strategy
        - Technical trade-offs
        - Risk assessment
        - Prioritization
    - title: API and developer ecosystem strategy
      body: Helping teams think through APIs, developer-facing capabilities, integration models and platform coherence as products evolve.
      tags:
        - API platforms
        - Developer experience
        - Extensibility
        - Platform coherence
    - title: AI-enabled product capabilities
      body: Helping teams evaluate where AI changes interaction models, workflows, ownership and the boundary between automation and product judgment.
      tags:
        - AI adoption
        - Agent workflows
        - Context access
        - Decision quality
  boundary_note: Advisory work focused on context analysis, facilitation, recommendations and the introduction of better decision-making and operating flows.
