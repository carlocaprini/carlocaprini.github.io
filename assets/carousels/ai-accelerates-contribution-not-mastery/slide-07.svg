<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350" role="img" aria-labelledby="title desc">
  <title id="title">The distinction matters more now</title>
  <desc id="desc">Closing slide for the carousel.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#121839"/><stop offset="100%" stop-color="#03101a"/></linearGradient>
    <radialGradient id="glow" cx="78%" cy="18%" r="46%"><stop offset="0%" stop-color="#26d9ff" stop-opacity=".35"/><stop offset="100%" stop-color="#03101a" stop-opacity="0"/></radialGradient>
