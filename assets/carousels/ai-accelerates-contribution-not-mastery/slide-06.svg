<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350" role="img" aria-labelledby="title desc">
  <title id="title">The risk is false confidence</title>
  <desc id="desc">Slide about false confidence.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#111735"/><stop offset="100%" stop-color="#03101a"/></linearGradient>
    <radialGradient id="glow" cx="78%" cy="20%" r="46%"><stop offset="0%" stop-color="#27d8f7" stop-opacity=".32"/><stop offset="100%" stop-color="#03101a" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="1080" height="1350" fill="url(#bg)"/>
  <rect width="1080" height="1350" fill="url(#glow)"/>
  <rect x="78" y="78" width="924" height="1194" rx="54" fill="#0d1731" opacity=".72" stroke="#2e5f91" stroke-width="2"/>
  <text x="116" y="160" fill="#93a4c0" font-family="Inter, Avenir, Helvetica, Arial, sans-serif" font-size="24" letter-spacing="7">06</text>
  <text x="116" y="430" fill="#f6f8ff" font-family="Inter, Avenir, Helvetica, Arial, sans-serif" font-size="72" font-weight="760">
    <tspan x="116">The risk is</tspan>
    <tspan x="116" dy="90" fill="#27d8f7">false confidence</tspan>
  </text>
  <text x="116" y="744" fill="#b5c0d4" font-family="Inter, Avenir, Helvetica, Arial, sans-serif" font-size="36">
    <tspan x="116">Organizations may start mistaking</tspan>
    <tspan x="116" dy="54">early productivity for deep understanding.</tspan>
  </text>
  <text x="116" y="1186" fill="#7788a6" font-family="Inter, Avenir, Helvetica, Arial, sans-serif" font-size="22">AI accelerates contribution, not mastery</text>
</svg>
